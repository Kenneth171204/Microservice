version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: food_delivery_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: food_delivery
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis-db:
    image: redis:alpine
    container_name: food_delivery_redis
    ports:
      - "6379:6379"

  user-service:
    build: ./user-service
    restart: always
    ports:
      - "8001:8001"

  restaurant-service:
    build: ./restaurant-service
    restart: always
    ports:
      - "8002:8002"

  order-service:
    build: ./order-service
    restart: always
    ports:
      - "8003:8003"

  delivery-service:
    build: ./delivery-service
    restart: always
    ports:
      - "8004:8004"